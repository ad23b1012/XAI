# =============================================================================
# XAI Emotion Recognition — Default Configuration
# =============================================================================
# All hyperparameters and paths in one place for reproducibility.
# Override via CLI args or environment variables as needed.

# --- Paths ---
paths:
  data_dir: "data"
  fer2013_csv: "data/fer2013/fer2013.csv"
  rafdb_dir: "data/RAF-DB"
  checkpoint_dir: "checkpoints"
  output_dir: "outputs"

# --- Face Detection (MediaPipe) ---
face_detection:
  static_image_mode: true
  max_num_faces: 1
  min_detection_confidence: 0.5
  refine_landmarks: true          # Use 478 landmarks (more detailed)
  face_crop_padding: 0.2          # 20% padding around detected face

# --- AU Feature Extraction ---
au_extraction:
  # Thresholds for AU activation (calibrated on FER2013)
  # These are normalized distances (divided by face width)
  thresholds:
    mouth_open: 0.03              # AU26 — jaw drop
    lip_part: 0.02                # AU25 — lips parted
    eyebrow_raise_inner: 0.025    # AU1 — inner brow raise
    eyebrow_raise_outer: 0.025    # AU2 — outer brow raise
    brow_furrow: 0.015            # AU4 — brow lowerer
    eye_wide: 0.025               # AU5 — upper lid raise
    eye_squint: 0.012             # AU6+AU7 — cheek raise / lid tightener
    lip_corner_pull: 0.02         # AU12 — smile
    lip_corner_depress: 0.015     # AU15 — lip corner depressor
    chin_raise: 0.02              # AU17 — chin raiser

# --- Emotion Classifier ---
classifier:
  model_name: "poster_v2"         # Options: "poster_v2", "resnet50_cbam", "efficientnet_b0"
  num_classes: 7                  # FER2013: 7 classes
  image_size: 224                 # Resize input to 224x224
  backbone: "ir50"                # POSTER++ backbone: "ir50" or "vit_small"
  pretrained: true

# --- Training ---
training:
  epochs: 50
  batch_size: 32                  # Adjust for VRAM (32 for 224x224 on 6GB)
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  label_smoothing: 0.1            # Critical for FER2013 label noise
  use_amp: true                   # Mixed precision for RTX 4050
  gradient_accumulation_steps: 1
  num_workers: 4
  pin_memory: true
  early_stopping_patience: 10

# --- Data Augmentation ---
augmentation:
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_erasing_prob: 0.25
  normalize:
    mean: [0.485, 0.456, 0.406]   # ImageNet normalization
    std: [0.229, 0.224, 0.225]

# --- Attention (Grad-ECLIP) ---
attention:
  method: "grad_eclip"            # Options: "grad_eclip", "grad_cam", "eigen_grad_cam"
  target_layer: "last"            # Which layer to extract attention from
  heatmap_threshold: 0.3          # Top 30% intensity for region parsing
  colormap: "jet"                 # Colormap for heatmap overlay
  alpha: 0.4                      # Overlay transparency

# --- Region Parser ---
region_parser:
  regions:
    - "forehead"
    - "left_eyebrow"
    - "right_eyebrow"
    - "left_eye"
    - "right_eye"
    - "nose"
    - "left_cheek"
    - "right_cheek"
    - "mouth"
    - "chin"
    - "jaw"

# --- Explanation Generator (LLaVA-7B) ---
explainer:
  model_name: "llava-hf/llava-1.5-7b-hf"
  quantization: "4bit"            # 4-bit via bitsandbytes (fits 6GB VRAM)
  max_new_tokens: 150
  temperature: 0.3                # Low temperature for clinical precision
  do_sample: false                # Greedy decoding for consistency
  device: "cuda"

# --- Pipeline ---
pipeline:
  sequential_loading: true        # Unload classifier before loading VLM
  save_visualizations: true
  save_explanations: true
  output_format: "json"           # Output format: "json" or "text"

# --- Emotion Labels ---
emotion_labels:
  fer2013: ["angry", "disgust", "fear", "happy", "sad", "surprise", "neutral"]
  rafdb: ["surprise", "fear", "disgust", "happy", "sad", "angry", "neutral"]
  affectnet: ["neutral", "happy", "sad", "surprise", "fear", "disgust", "angry", "contempt"]
